name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o /dev/null .

      - name: Vet
        run: go vet ./...
