name: Release

# Runs after CI passes on a push to master. Bumps patch from the latest v* tag,
# builds linux/amd64+arm64, and publishes GitHub Release assets for install-release.sh.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skipped: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Skip if commit already tagged
        id: check
        run: |
          if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit already has a version tag; skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.check.outputs.skip != 'true'
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next=v0.1.0
          else
            base="${latest#v}"
            IFS=. read -r major minor patch <<< "$base"
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          fi
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${next}"

  build:
    needs: release
    if: needs.release.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build and package
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release.outputs.tag }}
        run: |
          ver="${VERSION#v}"
          LDFLAGS="-s -w -X github.com/gsusgit/tuido/cmd.version=${ver}"
          go build -ldflags "${LDFLAGS}" -o tuido .

          PKG="tuido_${ver}_linux_${GOARCH}"
          mkdir -p "${PKG}"
          mv tuido "${PKG}/"
          cp LICENSE "${PKG}/"
          tar -czf "${PKG}.tar.gz" "${PKG}"

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goarch }}
          path: tuido_*.tar.gz

  publish:
    needs: [release, build]
    if: needs.release.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum tuido_*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: |
            dist/tuido_*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
