name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build and package
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          LDFLAGS="-s -w -X github.com/gsusgit/tuido/cmd.version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -o tuido .

          PKG="tuido_${VERSION}_linux_${GOARCH}"
          mkdir -p "${PKG}"
          mv tuido "${PKG}/"
          cp LICENSE "${PKG}/"
          tar -czf "${PKG}.tar.gz" "${PKG}"

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goarch }}
          path: tuido_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum tuido_*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tuido_*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
